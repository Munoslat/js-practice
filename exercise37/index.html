<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do list</title>
    <style>
        body {
                font-family: Arial, sans-serif;
               background-color: #eeeff1;
                margin: 0;
                padding: 0;
                font-size: 2rem;
    }
    h2 {
    text-align: center; 
    color: #0c0c0c;
    font-size: 5rem;
    margin-top: 2%;
    }
    h1 {
    text-align: center; 
    color: #0c0c0c;
    font-size: 2.2rem;
    margin-top: 0;
    }
    h3 {
    text-align: center; 
    color: #0c0c0c;
    font-size: 2.2rem;
      background-color:white;
      border-radius: 20px;
      width: 49%;
      margin: 0 auto;
     padding: 40px;
      margin-top: 20px;
    }
 .container1 {    
    display: flex;
    flex-direction: column;  
    gap: 10px;
    width: 50%;
    height: 600px;
    margin: 5px auto;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 30px;
    background-color: white;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
    }
    .container1 input {
        width: 97%;
    padding: 20px;  
    font-size: 1.2rem;
    border: 1px solid #ddd;
    border-radius: 5px;
    }
    .container1 textarea {
        width: 97%;
        height: 300px;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1.2rem;
     resize: none ;
 }
 button {
    margin-top: 10px;
    padding: 10px;
    }
 
    #todoContainer .todo-item {
      margin:0 auto;
      width: 50%;
       background-color: white;
     padding: 10px;
      margin-top: 10px;
    
    }
  .todo-item {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 10px;
  }
  .todo-item span {
    font-size: 3rem;
    margin-top: 5%;
    color: #080808;
  }
  .todo-item p {
    font-size: 2.2rem;
    color: #0a0a0a;
  }

  .todo-item button {
    width: 100px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: rgb(14, 13, 13);
  } 
  .todo-item img {
    width: 100%;
    height: 600px;
    margin-top: 60px;
    
  }
</style>
</head>
<body>

<h2>simple Blog</h2>
<div class="container1">
  <h1>Create a New Todo</h1>
<input type="text" id="todoInput" placeholder="post title">
<input type="text" id="imageInput" placeholder="image URL(optional)">
<textarea name="content" id="content" placeholder="content"></textarea>
<button id="addBtn">Add Todo</button>
</div>
<h3>All Todos</h3>
<div id="todoContainer"></div>

<script src="main.js"></script>
</body>
</html>
